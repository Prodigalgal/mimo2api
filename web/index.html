<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>MiMo2API</title>
  <style>
    :root { color-scheme: light; --ink:#17211b; --muted:#69736d; --line:#d8ddd9; --paper:#fff; --wash:#f3f5f3; --green:#16794b; --red:#b42318; --blue:#1769aa; }
    * { box-sizing:border-box; letter-spacing:0; }
    body { margin:0; background:var(--wash); color:var(--ink); font:14px/1.45 Inter,Segoe UI,Arial,sans-serif; }
    header { height:58px; background:var(--paper); border-bottom:1px solid var(--line); display:flex; align-items:center; justify-content:space-between; padding:0 28px; position:sticky; top:0; z-index:2; }
    h1 { font-size:18px; margin:0; } .runtime { color:var(--muted); font-size:12px; }
    nav { background:var(--paper); border-bottom:1px solid var(--line); padding:0 28px; display:flex; gap:22px; overflow:auto; }
    nav button { border:0; border-bottom:2px solid transparent; background:none; padding:13px 0 11px; color:var(--muted); cursor:pointer; }
    nav button.active { color:var(--ink); border-color:var(--green); font-weight:600; }
    main { max-width:1180px; margin:0 auto; padding:24px 28px 48px; }
    .metrics { display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); border:1px solid var(--line); background:var(--paper); margin-bottom:22px; }
    .metric { padding:16px 18px; border-right:1px solid var(--line); } .metric:last-child{border:0}.metric b{display:block;font-size:22px}.metric span{color:var(--muted);font-size:12px}
    section { display:none; } section.active { display:block; }
    .bar { display:flex; align-items:center; justify-content:space-between; gap:12px; margin:0 0 12px; } h2 { font-size:16px; margin:0; }
    .panel { background:var(--paper); border:1px solid var(--line); padding:20px; }
    .grid { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:15px 20px; }
    label { display:grid; gap:6px; color:var(--muted); font-size:12px; }
    input,select { width:100%; height:38px; border:1px solid #bfc8c1; background:#fff; padding:0 10px; color:var(--ink); font:inherit; }
    input:focus { outline:2px solid #9fd3ba; border-color:var(--green); }
    button.action { border:1px solid #aab5ad; background:#fff; height:34px; padding:0 12px; cursor:pointer; color:var(--ink); }
    button.primary { background:var(--green); color:#fff; border-color:var(--green); } button.danger { color:var(--red); border-color:#efb3ad; }
    .actions { display:flex; gap:8px; flex-wrap:wrap; }
    table { width:100%; border-collapse:collapse; background:var(--paper); border:1px solid var(--line); }
    th,td { text-align:left; padding:11px 12px; border-bottom:1px solid var(--line); vertical-align:middle; } th { background:#f8f9f8; color:var(--muted); font-size:12px; font-weight:600; }
    td code { font-size:12px; color:var(--blue); } .ok { color:var(--green); }.bad{color:var(--red)} .empty{padding:34px;text-align:center;color:var(--muted)}
    #toast { position:fixed; right:22px; bottom:22px; max-width:420px; padding:11px 14px; background:#17211b; color:white; display:none; }
    @media(max-width:760px){header,nav{padding-left:16px;padding-right:16px}main{padding:18px 14px}.metrics{grid-template-columns:1fr 1fr}.metric:nth-child(2){border-right:0}.metric:nth-child(-n+2){border-bottom:1px solid var(--line)}.grid{grid-template-columns:1fr}.table-wrap{overflow:auto} }
  </style>
</head>
<body>
  <header><h1>MiMo2API</h1><span class="runtime">Node.js · SQLite · v3</span></header>
  <nav>
    <button class="active" data-tab="accounts">账号</button><button data-tab="renewals">保活</button><button data-tab="mail">临时邮箱</button><button data-tab="proxy">代理</button><button data-tab="api">API</button>
  </nav>
  <main>
    <div class="metrics"><div class="metric"><b id="mAccounts">-</b><span>账号</span></div><div class="metric"><b id="mDue">-</b><span>待续期</span></div><div class="metric"><b id="mProxy">-</b><span>代理节点</span></div><div class="metric"><b id="mFailures">-</b><span>续期异常</span></div></div>
    <section id="accounts" class="active"><div class="bar"><h2>账号池</h2><button class="action" onclick="loadAll()">刷新</button></div><div class="table-wrap"><table><thead><tr><th>#</th><th>用户</th><th>邮箱</th><th>状态</th><th>最近续期</th><th>操作</th></tr></thead><tbody id="accountRows"></tbody></table></div></section>
    <section id="renewals"><div class="bar"><h2>保活队列</h2><button class="action primary" onclick="queueRenewals()">分散续期全部</button></div><div class="panel"><div class="grid"><label>运行状态<input id="rRunning" readonly></label><label>并发<input id="rConcurrency" readonly></label><label>下次任务<input id="rNext" readonly></label><label>队列<input id="rQueue" readonly></label></div></div></section>
    <section id="mail"><div class="bar"><h2>临时邮箱</h2><div class="actions"><button class="action" onclick="testMail()">测试</button><button class="action primary" onclick="saveMail()">保存</button></div></div><div class="panel grid"><label>API 地址<input id="mailBase"></label><label>管理口令<input id="mailAdmin" type="password"></label><label>默认域名<input id="mailDomain"></label><label>站点口令<input id="mailSite" type="password"></label></div></section>
    <section id="proxy"><div class="bar"><h2>代理池</h2><div class="actions"><button class="action" onclick="proxyAction('refresh')">刷新订阅</button><button class="action" onclick="proxyAction('start')">启动</button><button class="action" onclick="proxyAction('rotate')">轮换</button><button class="action" onclick="proxyAction('test')">测试</button><button class="action danger" onclick="proxyAction('stop')">停止</button><button class="action primary" onclick="saveProxy()">保存</button></div></div><div class="panel grid"><label>启用<select id="proxyEnabled"><option value="true">是</option><option value="false">否</option></select></label><label>本地端口<input id="proxyPort" type="number"></label><label style="grid-column:1/-1">订阅地址<input id="proxySub" type="password"></label><label style="grid-column:1/-1">sing-box 路径<input id="proxyBin"></label></div></section>
    <section id="api"><div class="bar"><h2>访问配置</h2><button class="action primary" onclick="saveApi()">保存</button></div><div class="panel grid"><label>API Keys<input id="apiKeys" type="password"></label><label>管理密码<input id="adminPassword" type="password"></label></div></section>
  </main><div id="toast"></div>
  <script>
    let config={};
    const $=id=>document.getElementById(id); const api=async(url,opt={})=>{const r=await fetch(url,{...opt,headers:{'Content-Type':'application/json',...(opt.headers||{})}});const j=await r.json();if(!r.ok)throw new Error(j.error?.message||j.detail||r.statusText);return j};
    const toast=(m,bad=false)=>{const e=$('toast');e.textContent=m;e.style.background=bad?'#b42318':'#17211b';e.style.display='block';setTimeout(()=>e.style.display='none',3500)};
    document.querySelectorAll('nav button').forEach(b=>b.onclick=()=>{document.querySelectorAll('nav button,section').forEach(e=>e.classList.remove('active'));b.classList.add('active');$(b.dataset.tab).classList.add('active')});
    async function loadAll(){try{config=await api('/api/config');const a=config.mimo_accounts||[];$('mAccounts').textContent=a.length;$('accountRows').innerHTML=a.length?a.map((x,i)=>`<tr><td>${i+1}</td><td><code>${x.user_id||'-'}</code></td><td>${x.email||'-'}</td><td class="${x.is_valid?'ok':'bad'}">${x.is_valid?'有效':'待验证'}</td><td>${x.last_renew||'-'}</td><td><div class="actions"><button class="action" onclick="accountAction(${i},'test')">测试</button><button class="action" onclick="accountAction(${i},'renew')">续期</button><button class="action danger" onclick="accountAction(${i},'delete')">删除</button></div></td></tr>`).join(''):'<tr><td colspan="6" class="empty">暂无账号</td></tr>';applyForms();await loadRuntime()}catch(e){toast(e.message,true)}}
    function applyForms(){const m=config.temp_mail||{},p=config.proxy_pool||{};$('mailBase').value=m.api_base||'';$('mailAdmin').value=m.admin_password||'';$('mailDomain').value=m.domain||'';$('mailSite').value=m.site_password||'';$('proxyEnabled').value=String(!!p.enabled);$('proxyPort').value=p.listen_port||17890;$('proxySub').value=p.sub_url||'';$('proxyBin').value=p.singbox_path||'';$('apiKeys').value=config.api_keys||'';$('adminPassword').value=config.admin_password||''}
    async function loadRuntime(){const r=await api('/api/accounts/renew-status'),p=await api('/api/proxy-pool/status');$('mDue').textContent=r.due;$('mFailures').textContent=r.failed;$('mProxy').textContent=p.node_count;$('rRunning').value=r.running?'运行中':'已停止';$('rConcurrency').value=r.concurrency;$('rNext').value=r.nextAt?new Date(r.nextAt).toLocaleString():'-';$('rQueue').value=`待处理 ${r.due} · 执行中 ${r.leased}`}
    async function accountAction(i,a){try{if(a==='delete'&&!confirm('确认删除该账号？'))return;const j=await api(`/api/accounts/${i}${a==='delete'?'':'/'+a}`,{method:a==='delete'?'DELETE':'POST'});toast(j.ok===false?j.error:'操作完成',j.ok===false);await loadAll()}catch(e){toast(e.message,true)}}
    async function queueRenewals(){try{const j=await api('/api/accounts/renew-all',{method:'POST'});toast(`已分散排队 ${j.queued} 个账号`);await loadRuntime()}catch(e){toast(e.message,true)}}
    async function saveMail(){try{await api('/api/temp-mail/config',{method:'POST',body:JSON.stringify({api_base:$('mailBase').value,admin_password:$('mailAdmin').value,domain:$('mailDomain').value,site_password:$('mailSite').value})});toast('已保存')}catch(e){toast(e.message,true)}}
    async function testMail(){try{const j=await api('/api/temp-mail/test',{method:'POST'});toast(j.test_address?`测试邮箱 ${j.test_address}`:'连接成功')}catch(e){toast(e.message,true)}}
    async function saveProxy(){try{await api('/api/proxy-pool/config',{method:'POST',body:JSON.stringify({enabled:$('proxyEnabled').value==='true',sub_url:$('proxySub').value,listen_port:Number($('proxyPort').value),singbox_path:$('proxyBin').value})});toast('已保存');await loadRuntime()}catch(e){toast(e.message,true)}}
    async function proxyAction(a){try{const j=await api('/api/proxy-pool/'+a,{method:'POST'});toast(j.egress||'操作完成');await loadRuntime()}catch(e){toast(e.message,true)}}
    async function saveApi(){try{await api('/api/config',{method:'POST',body:JSON.stringify({api_keys:$('apiKeys').value,admin_password:$('adminPassword').value})});toast('已保存，请使用新凭据重新登录')}catch(e){toast(e.message,true)}}
    loadAll(); setInterval(loadRuntime,15000);
  </script>
</body></html>
