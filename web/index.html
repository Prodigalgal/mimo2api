<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MiMo2API</title>
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --success: #10b981;
            --success-hover: #059669;
            --danger: #ef4444;
            --danger-hover: #dc2626;
            --bg: #0f172a;
            --bg-card: #1e293b;
            --bg-input: #334155;
            --text: #f1f5f9;
            --text-muted: #94a3b8;
            --border: #475569;
            --shadow: rgba(0, 0, 0, 0.3);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, var(--bg) 0%, #1a1a2e 100%);
            min-height: 100vh; color: var(--text); line-height: 1.6;
        }
        .container { max-width: 720px; margin: 0 auto; padding: 40px 20px; }
        .header { text-align: center; margin-bottom: 40px; }
        .header h1 {
            font-size: 2.2rem; font-weight: 700;
            background: linear-gradient(135deg, #6366f1, #a855f7, #ec4899);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text; margin-bottom: 8px;
        }
        .header p { color: var(--text-muted); font-size: 1rem; }
        .card {
            background: var(--bg-card); border-radius: 16px; padding: 24px;
            margin-bottom: 24px; box-shadow: 0 4px 24px var(--shadow);
            border: 1px solid rgba(255,255,255,0.05);
        }
        .card h2 {
            font-size: 1.25rem; font-weight: 600; margin-bottom: 16px;
            display: flex; align-items: center; gap: 10px;
        }
        .card h2::before {
            content: ''; width: 4px; height: 20px;
            background: linear-gradient(180deg, var(--primary), #a855f7);
            border-radius: 2px;
        }
        input, textarea {
            width: 100%; padding: 12px 16px;
            background: var(--bg-input); border: 1px solid var(--border);
            border-radius: 10px; color: var(--text); font-size: 14px;
            transition: border-color 0.2s; outline: none;
        }
        input:focus, textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99,102,241,0.2);
        }
        input::placeholder, textarea::placeholder { color: var(--text-muted); }

        .secret-wrap {
            position: relative; display: flex; align-items: center;
        }
        .secret-wrap input {
            padding-right: 44px;
        }
        .eye-btn {
            position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
            border: none; background: transparent; color: var(--text-muted);
            cursor: pointer; padding: 4px 8px; font-size: 16px; line-height: 1;
            border-radius: 6px;
        }
        .eye-btn:hover { color: var(--text); background: rgba(148,163,184,0.12); }

        textarea {
            height: 140px; font-family: 'SF Mono', Monaco, monospace;
            font-size: 12px; resize: vertical;
        }
        button {
            padding: 10px 20px; border: none; border-radius: 8px;
            font-size: 14px; font-weight: 500; cursor: pointer;
            transition: all 0.2s; display: inline-flex;
            align-items: center; gap: 6px;
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--primary), #8b5cf6);
            color: white;
        }
        .btn-primary:hover { background: linear-gradient(135deg, var(--primary-hover), #7c3aed); }
        .btn-success { background: linear-gradient(135deg, var(--success), #34d399); color: white; }
        .btn-success:hover { background: linear-gradient(135deg, var(--success-hover), #10b981); }
        .btn-danger { background: var(--danger); color: white; padding: 6px 12px; font-size: 12px; }
        .btn-danger:hover { background: var(--danger-hover); }
        .btn-outline {
            background: transparent; border: 1px solid var(--border);
            color: var(--text); padding: 8px 16px; font-size: 13px;
        }
        .btn-outline:hover { background: var(--bg-input); border-color: var(--primary); }
        .btn-group { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 12px; }
        .field { margin-bottom: 12px; }
        .field label {
            display: block; font-size: 12px; color: var(--text-muted); margin-bottom: 4px;
        }

        /* Toggle switch */
        .toggle-row { display:flex; align-items:center; justify-content:space-between; }
        .toggle-label { font-size:12px; color:var(--text-muted); }
        .switch { position:relative; display:inline-block; width:40px; height:22px; }
        .switch input { opacity:0; width:0; height:0; }
        .slider {
            position:absolute; cursor:pointer; top:0; left:0; right:0; bottom:0;
            background:var(--bg-input); border-radius:22px; transition:0.3s;
        }
        .slider::before {
            content:''; position:absolute; height:16px; width:16px; left:3px; bottom:3px;
            background:var(--text-muted); border-radius:50%; transition:0.3s;
        }
        .switch input:checked + .slider { background:var(--primary); }
        .switch input:checked + .slider::before { transform:translateX(18px); background:#fff; }

        /* Tabs */
        .tabs {
            display: flex; gap: 0; margin-bottom: 0;
            border-radius: 10px 10px 0 0; overflow: hidden;
            border: 1px solid var(--border); border-bottom: none;
        }
        .tab {
            flex: 1; padding: 10px 4px; text-align: center; font-size: 13px;
            cursor: pointer; background: var(--bg); color: var(--text-muted);
            transition: all 0.2s; border: none;
        }
        .tab.active { background: var(--primary); color: #fff; }
        .tab:first-child { border-radius: 10px 0 0 0; }
        .tab:last-child { border-radius: 0 10px 0 0; }
        .tab-content { border: 1px solid var(--border); border-top: none; border-radius: 0 0 10px 10px; padding: 20px; }
        .tab-panel { display: none; }
        .tab-panel.active { display: block; }

        /* Status messages */
        .status {
            padding: 10px 14px; border-radius: 8px; margin: 12px 0; font-size: 13px;
            display: flex; align-items: center; gap: 8px;
        }
        .status.ok { background: rgba(16,185,129,0.15); color: #34d399; border: 1px solid rgba(16,185,129,0.3); }
        .status.err { background: rgba(239,68,68,0.15); color: #f87171; border: 1px solid rgba(239,68,68,0.3); }
        .status.info { background: rgba(99,102,241,0.15); color: #a5b4fc; border: 1px solid rgba(99,102,241,0.3); }
        .status .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
        .dot-ok { background: #22c55e; }
        .dot-err { background: #ef4444; }
        .dot-idle { background: #64748b; }

        /* Account list */
        .account {
            background: var(--bg-input); padding: 14px 16px; border-radius: 10px;
            margin-bottom: 8px; border: 1px solid var(--border);
        }
        .account .info-line { font-size: 12px; color: var(--text-muted); margin-bottom: 3px; }
        .account .info-line b { color: var(--text); }
        .account code { background: var(--bg); padding: 1px 6px; border-radius: 4px; font-size: 11px; color: #7dd3fc; word-break: break-all; }
        .account .actions { display: flex; gap: 8px; margin-top: 10px; }
        .account .status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }
        .acct-pager {
            display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap;
            gap: 10px; margin: 12px 0 4px; font-size: 13px; color: var(--text-muted);
        }
        .acct-pager .pager-btns { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
        .acct-pager select {
            background: var(--bg-input); border: 1px solid var(--border); color: var(--text);
            border-radius: 8px; padding: 6px 10px; font-size: 12px; outline: none;
        }
        .acct-pager .page-btn {
            min-width: 34px; padding: 6px 10px; font-size: 12px;
            background: var(--bg-input); border: 1px solid var(--border); color: var(--text);
            border-radius: 8px; cursor: pointer;
        }
        .acct-pager .page-btn:hover:not(:disabled) { border-color: var(--primary); color: #fff; }
        .acct-pager .page-btn.active { background: var(--primary); border-color: var(--primary); color: #fff; }
        .acct-pager .page-btn:disabled { opacity: 0.4; cursor: not-allowed; }

        /* 批量注册实时日志 */
        .reg-log-box {
            margin-top: 12px; background: #0b1220; border: 1px solid var(--border);
            border-radius: 10px; max-height: 280px; overflow: auto; font-family: 'SF Mono', Monaco, monospace;
            font-size: 11px; line-height: 1.55; padding: 10px 12px; color: #94a3b8;
        }
        .reg-log-box .log-line { margin: 0 0 4px; word-break: break-all; }
        .reg-log-box .log-ts { color: #64748b; margin-right: 6px; }
        .reg-log-box .log-attempt { color: #38bdf8; margin-right: 4px; }
        .reg-log-box .log-stage { color: #a78bfa; margin-right: 4px; }
        .reg-log-box .log-email { color: #34d399; margin-right: 4px; }
        .reg-log-box .log-err { color: #f87171; }
        .reg-log-box .log-done { color: #4ade80; }
        .reg-slots {
            display: flex; flex-direction: column; gap: 6px; margin-top: 10px;
        }
        .reg-slot {
            background: var(--bg-input); border: 1px solid var(--border); border-radius: 8px;
            padding: 8px 10px; font-size: 12px; color: var(--text-muted);
        }
        .reg-slot.active { border-color: rgba(99,102,241,0.5); }
        .reg-slot b { color: var(--text); }
        .empty { text-align: center; color: var(--text-muted); padding: 24px; font-size: 14px; }

        /* Toast */
        .toast {
            position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
            padding: 10px 20px; border-radius: 8px; font-size: 13px; z-index: 999;
            display: none; white-space: nowrap;
        }
        .toast.show { display: block; }
        .toast-ok { background: #064e3b; color: #6ee7b7; }
        .toast-err { background: #7f1d1d; color: #fca5a5; }

        /* Responsive */
        @media (max-width: 480px) {
            .container { padding: 20px 16px; }
            .header h1 { font-size: 1.8rem; }
            .card { padding: 20px; }
            .btn-group { flex-direction: column; }
            .btn-group button { width: 100%; justify-content: center; }
        }

        /* Usage table */
        .usage-tbl { width: 100%; border-collapse: collapse; font-size: 13px; }
        .usage-tbl th, .usage-tbl td { padding: 10px 12px; text-align: right; border-bottom: 1px solid var(--border); }
        .usage-tbl th { color: var(--text-muted); font-weight: 500; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; white-space: nowrap; position: sticky; top: 0; background: var(--bg-card); z-index: 1; }
        .usage-tbl td { font-variant-numeric: tabular-nums; }
        .usage-tbl tr:last-child td { border-bottom: none; }
        .usage-tbl .model-cell { text-align: left; }
        .usage-scroll { max-height: 440px; overflow-y: auto; }
        .usage-tbl .total-row { font-weight: 600; border-top: 2px solid var(--primary); }
        .usage-tbl .total-row td { padding-top: 14px; color: #a5b4fc; background: var(--bg-card); position: sticky; bottom: 0; }
        .usage-empty { text-align: center; color: var(--text-muted); padding: 40px 20px; }
        .usage-empty .icon { font-size: 40px; margin-bottom: 10px; }

        /* Period & model filter buttons */
        .period-btn {
            padding: 8px 16px; border-radius: 8px; border: 1px solid var(--border);
            background: transparent; color: var(--text);
            font-size: 13px; cursor: pointer; transition: all 0.2s;
        }
        .period-btn:hover { background: var(--bg-input); border-color: var(--primary); }
        .period-btn.active {
            background: var(--primary); color: #fff; border-color: var(--primary);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>MiMo2API</h1>
            <p>小米 MiMo OpenAI 兼容 API · 临时邮箱自动注册 · 多账号保活</p>
        </div>

        <!-- 标签页 -->
        <div class="card" style="padding: 0; overflow: visible;">
            <div class="tabs">
                <div class="tab active" onclick="switchTab('curl')">cURL</div>
                <div class="tab" onclick="switchTab('cookie')">Cookie</div>
                <div class="tab" onclick="switchTab('email')">邮箱</div>
                <div class="tab" onclick="switchTab('register')">自动注册</div>
                <div class="tab" onclick="switchTab('tempmail')">临时邮箱</div>
                <div class="tab" onclick="switchTab('proxy')">代理池</div>
                <div class="tab" onclick="switchTab('accounts')">账号</div>
                <div class="tab" onclick="switchTab('apikey')">API Key</div>
                <div class="tab" onclick="switchTab('usage')">用量统计</div>
            </div>

            <div class="tab-content">
                <!-- cURL 导入 -->
                <div id="panel-curl" class="tab-panel active">
                    <details style="margin-bottom:12px">
                        <summary style="cursor:pointer;color:var(--primary);font-size:13px;padding:6px 0">如何获取 cURL?</summary>
                        <ol style="margin:10px 0;padding-left:20px;color:var(--text-muted);font-size:13px;line-height:1.8">
                            <li>登录 <a href="https://aistudio.xiaomimimo.com" target="_blank" style="color:var(--primary)">aistudio.xiaomimimo.com</a></li>
                            <li>按 F12 → Network 标签</li>
                            <li>发一条消息，找到 <code style="background:var(--bg-input);padding:1px 5px;border-radius:3px;font-size:12px">chat</code> 请求</li>
                            <li>右键 → Copy as cURL，粘贴到下方</li>
                        </ol>
                    </details>
                    <textarea id="curl" placeholder="curl 'https://aistudio.xiaomimimo.com/open-apis/bot/chat...'"></textarea>
                    <button class="btn-primary" style="margin-top:4px;width:100%" onclick="parseCurl()">解析 cURL</button>
                    <div id="curlResult"></div>
                </div>

                <!-- Cookie 手动输入 -->
                <div id="panel-cookie" class="tab-panel">
<textarea id="c-raw" placeholder="粘贴整段 Cookie，如: serviceToken=&quot;xxx&quot;; userId=123; xiaomichatbot_ph=&quot;yyy&quot;" style="height:60px"></textarea>
                    <button class="btn-outline" style="width:100%;margin-bottom:8px" onclick="parseCookieStr()">解析填充 ↓</button>
                    <div class="field"><label>serviceToken</label><input type="text" id="c-st" placeholder="粘贴 serviceToken"></div>
                    <div class="field"><label>userId</label><input type="text" id="c-uid" placeholder="粘贴 userId"></div>
                    <div class="field"><label>xiaomichatbot_ph</label><input type="text" id="c-ph" placeholder="粘贴 xiaomichatbot_ph"></div>
                    <button id="btn-save-cookie" class="btn-primary" style="width:100%" onclick="saveCookie()">保存账号</button>
                </div>

                <!-- 谷歌邮箱+密码导入（纯 API） -->
                <div id="panel-email" class="tab-panel">
<div class="field"><label>邮箱（Google / Xiaomi）</label><input type="email" id="e-email" placeholder="you@gmail.com"></div>
                    <div class="field"><label>密码</label><div class="secret-wrap"><input type="password" id="e-pass" placeholder="小米账号密码"><button type="button" class="eye-btn" data-eye-for="e-pass" onclick="toggleSecret('e-pass', this)" title="显示/隐藏">👁</button></div></div>
                    <div class="field" id="e-otp-wrap" style="display:none">
                        <label>邮箱验证码</label>
                        <input type="text" id="e-otp" placeholder="6 位验证码" maxlength="8">
                        <div class="btn-group" style="margin-top:8px">
                            <button type="button" class="btn-outline" id="btn-send-otp" onclick="sendEmailOtp()">发送验证码</button>
                            <button type="button" class="btn-primary" id="btn-submit-otp" onclick="importEmail()">提交验证码</button>
                        </div>
                    </div>
                    <label class="toggle-row" style="margin:8px 0 12px">
                        <span class="toggle-label">启用自动续期（仅 passToken）</span>
                        <label class="switch">
                            <input type="checkbox" id="e-autorenew" checked>
                            <span class="slider"></span>
                        </label>
                    </label>
                    <button id="btn-email-import" class="btn-primary" style="width:100%" onclick="importEmail()">导入账号</button>
                    <div id="emailResult"></div>
                </div>

                <!-- 自动注册 -->
                <div id="panel-register" class="tab-panel">
<div class="field"><label>注册地区（勿选 CN；批量时 RANDOM 每个账号独立随机）</label>
                        <select id="reg-region" style="width:100%;padding:12px 16px;background:var(--bg-input);border:1px solid var(--border);border-radius:10px;color:var(--text)">
                            <option value="RANDOM" selected>🎲 随机（非中国）</option>
                            <option value="US">United States (US)</option>
                            <option value="SG">Singapore (SG)</option>
                            <option value="JP">Japan (JP)</option>
                            <option value="HK">Hong Kong (HK)</option>
                            <option value="TW">Taiwan (TW)</option>
                            <option value="GB">United Kingdom (GB)</option>
                            <option value="DE">Germany (DE)</option>
                            <option value="FR">France (FR)</option>
                            <option value="KR">Korea (KR)</option>
                            <option value="AU">Australia (AU)</option>
                            <option value="CA">Canada (CA)</option>
                            <option value="IN">India (IN)</option>
                            <option value="BR">Brazil (BR)</option>
                        </select>
                    </div>
                    <div class="field" style="display:none"><label>域名（已自动获取，无需填写）</label>
                        <input type="text" id="reg-domain" placeholder="自动" value="">
                    </div>
                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
                        <div class="field"><label>成功目标数（达到即停，0=不提前停）</label>
                            <input type="number" id="reg-success-target" min="0" max="50" value="1" title="成功注册多少个后结束">
                        </div>
                        <div class="field"><label>最大尝试次数</label>
                            <input type="number" id="reg-batch-count" min="1" max="50" value="1" title="最多尝试多少次">
                        </div>
                        <div class="field"><label>并发数</label>
                            <input type="number" id="reg-concurrent" min="1" max="10" value="1">
                        </div>
                        <div class="field"><label>并发间隔（秒）</label>
                            <input type="number" id="reg-interval" min="0" max="300" step="0.5" value="3">
                        </div>
                        <div class="field"><label>OCR 重试次数</label>
                            <input type="number" id="reg-captcha-retries" min="1" max="30" value="10">
                        </div>
                        <div class="field"><label>邮件验证码超时（秒）</label>
                            <input type="number" id="reg-otp-timeout" min="30" max="600" value="120">
                        </div>
                    </div>
                    <label class="toggle-row" style="margin:8px 0 12px">
                        <span class="toggle-label">自动 OCR 过图片验证码（ddddocr）</span>
                        <label class="switch">
                            <input type="checkbox" id="reg-auto-ocr" checked>
                            <span class="slider"></span>
                        </label>
                    </label>
                    <div id="reg-captcha-wrap" style="display:none;margin:12px 0">
                        <div class="field"><label>图片验证码（自动失败时手动填写）</label>
                            <div style="display:flex;gap:12px;align-items:center;flex-wrap:wrap">
                                <img id="reg-captcha-img" alt="captcha" style="height:48px;border-radius:8px;background:#fff;cursor:pointer" title="点击刷新" onclick="refreshRegCaptcha()">
                                <input type="text" id="reg-icode" placeholder="输入验证码" style="flex:1;min-width:120px" maxlength="12">
                            </div>
                        </div>
                        <div class="info-line" style="font-size:12px;color:var(--text-muted);margin-bottom:8px">邮箱: <code id="reg-email-preview"></code> · 密码已随机生成</div>
                    </div>
                    <div class="btn-group">
                        <button class="btn-outline" style="flex:1" id="btn-reg-save" onclick="saveRegSettings()">保存注册参数</button>
                        <button class="btn-primary" style="flex:1" id="btn-reg-start" onclick="startAutoRegister()">单次注册</button>
                        <button class="btn-success" style="flex:1" id="btn-reg-batch" onclick="startBatchRegister()">批量注册</button>
                        <button class="btn-danger" style="flex:1;display:none" id="btn-reg-stop" onclick="stopBatchRegister()">停止任务</button>
                        <button class="btn-outline" style="flex:1;display:none" id="btn-reg-clear-log" onclick="clearBatchLogs()">清理日志</button>
                        <button class="btn-outline" style="flex:1;display:none" id="btn-reg-retry-ocr" onclick="retryRegOcr()">再试 OCR</button>
                        <button class="btn-outline" style="flex:1;display:none" id="btn-reg-submit" onclick="submitRegCaptcha()">手动提交验证码</button>
                    </div>
                    <div id="regResult"></div>
                    <div id="regSlots" class="reg-slots" style="display:none"></div>
                    <div id="regLogBox" class="reg-log-box" style="display:none"></div>
                </div>

                <!-- 临时邮箱配置（仅邮箱服务，不含注册参数） -->
                <div id="panel-tempmail" class="tab-panel">
<div class="field"><label>API 地址</label>
                        <div class="secret-wrap"><input type="password" id="tm-api" placeholder="https://apimail.example.com" autocomplete="off"><button type="button" class="eye-btn" data-eye-for="tm-api" onclick="toggleSecret('tm-api', this)" title="显示">👁</button></div>
                    </div>
                    <div class="field"><label>管理口令 (x-admin-auth)</label>
                        <div class="secret-wrap"><input type="password" id="tm-admin" placeholder="ADMIN_PASSWORDS 中的口令" autocomplete="off"><button type="button" class="eye-btn" data-eye-for="tm-admin" onclick="toggleSecret('tm-admin', this)" title="显示/隐藏">👁</button></div>
                    </div>
                    <div class="field"><label>站点密码 x-custom-auth（可选）</label>
                        <div class="secret-wrap"><input type="password" id="tm-site" placeholder="若部署启用了站点密码则填写" autocomplete="off"><button type="button" class="eye-btn" data-eye-for="tm-site" onclick="toggleSecret('tm-site', this)" title="显示/隐藏">👁</button></div>
                    </div>
                    <div class="field"><label>可用域名（自动检测，只读）</label>
                        <div id="tm-domains" style="font-size:12px;color:var(--text-muted);padding:8px 0">保存/测试后显示</div>
                    </div>
                    <div class="btn-group">
                        <button class="btn-outline" onclick="testTempMail()">测试连接</button>

    <div id="toast" class="toast"></div>

    <script>

let cfg = { api_keys: '', mimo_accounts: [] }, parsed = null;
        let _emailSessionId = null;
        let _regSessionId = null;
        let _regPassword = '';
        // 批量注册任务（内存 job，切页可恢复）
        let _batchJobId = localStorage.getItem('mimo_batch_job_id') || '';
        let _batchPollTimer = null;
        let _batchPolling = false;
        // 账号列表分页
        let _acctList = [];
        let _acctPage = 1;
        let _acctPageSize = parseInt(localStorage.getItem('mimo_acct_page_size') || '10', 10) || 10;

        // === 工具函数 ===
        function $id(id) { return document.getElementById(id); }

        function toggleSecret(id, btn) {
            var el = $id(id);
            if (!el) return;
            if (el.type === 'password') {
                el.type = 'text';
                if (btn) { btn.textContent = '🙈'; btn.title = '隐藏'; }
            } else {
                el.type = 'password';
                if (btn) { btn.textContent = '👁'; btn.title = '显示'; }
            }
        }


        function toast(msg, err) {
            const t = $id('toast');
            t.textContent = msg; t.className = 'toast show ' + (err ? 'toast-err' : 'toast-ok');
            clearTimeout(t._t); t._t = setTimeout(() => t.className = 'toast', 2500);
        }
        function showStatus(id, type, msg) {
            $id(id).innerHTML = `<div class="status ${type}">${msg}</div>`;
        }


        // === 安全 JSON 请求（避免 504/HTML 导致 Unexpected token '<'） ===
        async function apiFetch(url, opts) {
            opts = opts || {};
            opts.credentials = opts.credentials || 'same-origin';
            opts.headers = Object.assign({ 'Accept': 'application/json' }, opts.headers || {});
            const r = await fetch(url, opts);
            const ct = (r.headers.get('content-type') || '').toLowerCase();
            const text = await r.text();
            if (!text) {
                if (!r.ok) throw new Error('HTTP ' + r.status + ' 空响应');
                return {};
            }
            if (ct.indexOf('application/json') === -1 && text.trim().charAt(0) === '<') {
                throw new Error(
                    'HTTP ' + r.status + '：网关返回了 HTML（常见 504 超时）。' +
                    (r.status === 504 ? ' 批量任务请使用后台轮询，勿同步等待。' : ' 请检查接口路径或登录状态。')
                );
            }
            let j;
            try { j = JSON.parse(text); }
            catch (e) {
                throw new Error('响应不是 JSON（HTTP ' + r.status + '）: ' + text.slice(0, 120));
            }
            if (!r.ok && j && (j.error || j.detail)) {
                const err = j.error || (typeof j.detail === 'string' ? j.detail : JSON.stringify(j.detail));
                throw new Error(err);
            }
            return j;
        }

        function formatBatchResults(j) {
            const lines = (j.results || []).map(function (x, i) {
                const ok = x.logged_in || x.saved_ok || x.registered;
                return (ok ? '✅' : '❌') + ' #' + (x.attempt || (i + 1)) +
                    ' ' + (x.email || x.user_id || x.error || '') +
                    (x.region ? ' · ' + x.region : '');
            }).join('<br>');
            return (j.message || '') + (lines ? '<br>' + lines : '');
        }

        function _fmtLogTime(ts) {
            if (!ts) return '';
            const d = new Date((ts < 1e12 ? ts * 1000 : ts));
            const pad = function (n) { return n < 10 ? '0' + n : '' + n; };
            return pad(d.getHours()) + ':' + pad(d.getMinutes()) + ':' + pad(d.getSeconds());
        }

        function renderBatchProgress(st) {
            // summary
            const running = st.status === 'running';
            const type = st.status === 'error' ? 'err' : (running ? 'info' : (st.ok === false ? 'err' : 'ok'));
            let summary = (st.message || '') +
                (st.job_id ? '<br>job: <code>' + st.job_id + '</code>' : '') +
                '<br>成功 ' + (st.success || 0) +
                (st.success_target ? '/' + st.success_target : '') +
                ' · 已尝试 ' + (st.total || 0) + '/' + (st.max_attempts || '?') +
                (st.status ? ' · 状态 ' + st.status : '');
            if ((st.results || []).length) {
                summary += '<br>' + formatBatchResults(st).replace(st.message || '', '').replace(/^<br>/, '');
            }
            showStatus('regResult', type, summary);

            // slots
            const slotsEl = $id('regSlots');
            if (slotsEl) {
                const slots = st.slots || [];
                if (slots.length) {
                    slotsEl.style.display = 'flex';
                    slotsEl.innerHTML = slots.map(function (s) {
                        return '<div class="reg-slot' + (s.active ? ' active' : '') + '">' +
                            '<b>#' + (s.attempt || '-') + '</b> ' +
                            (s.email ? '<code>' + s.email + '</code> ' : '') +
                            '<span style="color:#a78bfa">[' + (s.stage || '') + ']</span> ' +
                            (s.message || '') +
                            '</div>';
                    }).join('');
                } else {
                    slotsEl.style.display = 'none';
                    slotsEl.innerHTML = '';
                }
            }

            // logs (newest at bottom, auto scroll)
            const box = $id('regLogBox');
            if (box) {
                const logs = st.logs || [];
                if (logs.length) {
                    box.style.display = 'block';
                    box.innerHTML = logs.map(function (L) {
                        const cls = (L.stage === 'error' || L.stage === 'cancelled') ? ' log-err' :
                            (L.stage === 'done' || L.stage === 'job' && (L.message || '').indexOf('完成') >= 0 ? ' log-done' : '');
                        return '<div class="log-line' + cls + '">' +
                            '<span class="log-ts">' + _fmtLogTime(L.ts) + '</span>' +
                            (L.attempt ? '<span class="log-attempt">#' + L.attempt + '</span>' : '') +
                            '<span class="log-stage">[' + (L.stage || '') + ']</span>' +
                            (L.email ? '<span class="log-email">' + L.email + '</span>' : '') +
                            (L.message || '') +
                            '</div>';
                    }).join('');
                    box.scrollTop = box.scrollHeight;
                } else if (!running) {
                    // keep hidden if empty after clear
                }
            }

            // buttons
            if ($id('btn-reg-stop')) $id('btn-reg-stop').style.display = running ? 'inline-flex' : 'none';
            if ($id('btn-reg-clear-log')) $id('btn-reg-clear-log').style.display = (st.logs && st.logs.length) || !running ? 'inline-flex' : (running ? 'inline-flex' : 'none');
            if ($id('btn-reg-batch')) $id('btn-reg-batch').disabled = running;
            if ($id('btn-reg-start')) $id('btn-reg-start').disabled = running;
        }

        function stopBatchPoll() {
            _batchPolling = false;
            if (_batchPollTimer) {
                clearTimeout(_batchPollTimer);
                _batchPollTimer = null;
            }
        }

        async function pollBatchJobOnce() {
            if (!_batchJobId) return null;
            try {
                const st = await apiFetch('/api/account/auto-register-batch/' + _batchJobId);
                st.job_id = st.job_id || _batchJobId;
                renderBatchProgress(st);
                return st;
            } catch (e) {
                if (String(e.message || e).indexOf('不存在') >= 0 || String(e.message || e).indexOf('404') >= 0) {
                    localStorage.removeItem('mimo_batch_job_id');
                    _batchJobId = '';
                    stopBatchPoll();
                }
                showStatus('regResult', 'err', e.message || String(e));
                return null;
            }
        }

        async function startBatchPollLoop() {
            if (_batchPolling || !_batchJobId) return;
            _batchPolling = true;
            const loop = async function () {
                if (!_batchPolling || !_batchJobId) return;
                const st = await pollBatchJobOnce();
                if (!st) { _batchPolling = false; return; }
                if (st.status === 'running') {
                    _batchPollTimer = setTimeout(loop, 1500);
                    return;
                }
                // finished
                stopBatchPoll();
                if ((st.success || 0) > 0) {
                    toast('成功 ' + st.success + ' 个');
                    loadAccounts();
                }
            };
            await loop();
        }

        async function resumeBatchJobIfAny() {
            // Prefer localStorage job; else ask server for latest running
            let id = localStorage.getItem('mimo_batch_job_id') || _batchJobId || '';
            if (!id) {
                try {
                    const list = await apiFetch('/api/account/auto-register-batch');
                    if (list.latest_running) id = list.latest_running;
                    else if (list.jobs && list.jobs[0]) {
                        // show last finished briefly
                        renderBatchProgress(list.jobs[0]);
                        return;
                    }
                } catch (e) { return; }
            }
            if (!id) return;
            _batchJobId = id;
            localStorage.setItem('mimo_batch_job_id', id);
            await startBatchPollLoop();
        }

        async function stopBatchRegister() {
            if (!_batchJobId) return;
            try {
                const st = await apiFetch('/api/account/auto-register-batch/' + _batchJobId + '/stop', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: '{}',
                });
                renderBatchProgress(st);
                toast('已请求停止');
            } catch (e) {
                toast(e.message || '停止失败', true);
            }
        }

        async function clearBatchLogs() {
            if (!_batchJobId) {
                if ($id('regLogBox')) { $id('regLogBox').innerHTML = ''; $id('regLogBox').style.display = 'none'; }
                if ($id('regSlots')) { $id('regSlots').innerHTML = ''; $id('regSlots').style.display = 'none'; }
                return;
            }
            try {
                const st = await apiFetch('/api/account/auto-register-batch/' + _batchJobId + '/clear-logs', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: '{}',
                });
                renderBatchProgress(st);
                if ($id('regLogBox')) { $id('regLogBox').innerHTML = ''; }
                toast('日志已清理');
            } catch (e) {
                toast(e.message || '清理失败', true);
            }
        }

        function switchTab(t) {
            const keys = ['curl','cookie','email','register','tempmail','proxy','accounts','apikey','usage'];
            document.querySelectorAll('.tab').forEach((el, i) => {
                el.className = 'tab' + (keys[i] === t ? ' active' : '');
            });
            document.querySelectorAll('.tab-panel').forEach(p => p.className = 'tab-panel');
            $id('panel-' + t).className = 'tab-panel active';
            if (t === 'accounts') loadAccounts();
            if (t === 'usage') loadUsage();
            if (t === 'tempmail') loadTempMail();
            if (t === 'proxy') loadProxyPool();
            if (t === 'register') {
                loadTempMail();
                resumeBatchJobIfAny();
            }
        }

        // === 代理池 ===
        function applyProxyForm(pp) {
            if (!pp) return;
            if ($id('px-enabled')) $id('px-enabled').checked = !!pp.enabled;
            if ($id('px-sub') && pp.sub_url != null) $id('px-sub').value = pp.sub_url || '';
            if ($id('px-port')) $id('px-port').value = pp.listen_port || 17890;
            if ($id('px-retries')) $id('px-retries').value = pp.connect_retries != null ? pp.connect_retries : 5;
            if ($id('px-refresh')) $id('px-refresh').value = pp.refresh_interval != null ? pp.refresh_interval : 3600;
            if ($id('px-bin')) $id('px-bin').value = pp.singbox_path || '';
            if ($id('px-fetch-each')) $id('px-fetch-each').checked = pp.fetch_sub_each_time !== false;
        }

        function collectProxyBody() {
            return {
                enabled: $id('px-enabled') ? $id('px-enabled').checked : false,
                sub_url: $id('px-sub') ? $id('px-sub').value.trim() : '',
                listen_port: parseInt($id('px-port').value, 10) || 17890,
                connect_retries: parseInt($id('px-retries') && $id('px-retries').value, 10) || 5,
                rotate_every: 1,
                refresh_interval: parseInt($id('px-refresh').value, 10) || 0,
                singbox_path: $id('px-bin') ? $id('px-bin').value.trim() : '',
                fetch_sub_each_time: $id('px-fetch-each') ? $id('px-fetch-each').checked : true,
            };
        }

        function renderProxyStatus(st) {
            const el = $id('pxStatus');
            if (!el) return;
            const nodes = (st.nodes || []).slice(0, 12).map(function (n) {
                return '· ' + (n.name || n.tag) + ' <code>' + n.server + ':' + n.port + '</code>';
            }).join('<br>');
            el.innerHTML =
                '<div><b>状态:</b> ' + (st.status || '-') +
                ' · <b>节点:</b> ' + (st.node_count || 0) +
                ' · <b>当前:</b> ' + (st.selected || '-') +
                ' · <b>代理:</b> <code>' + (st.proxy_url || '未运行') + '</code></div>' +
                (st.binary ? '<div style="margin-top:4px"><b>sing-box:</b> <code>' + st.binary + '</code></div>' : '') +
                (st.last_error ? '<div style="color:#f87171;margin-top:4px">' + st.last_error + '</div>' : '') +
                (nodes ? '<div style="margin-top:8px">' + nodes + '</div>' : '');
        }

        async function loadProxyPool() {
            try {
                const j = await apiFetch('/api/proxy-pool/config');
                if (j.proxy_pool) applyProxyForm(j.proxy_pool);
                if (j.runtime) renderProxyStatus(j.runtime);
                else renderProxyStatus(j);
            } catch (e) {
                showStatus('pxResult', 'err', e.message || String(e));
            }
        }

        async function saveProxyPool() {
            try {
                const j = await apiFetch('/api/proxy-pool/config', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(collectProxyBody()),
                });
                if (j.ok) {
                    showStatus('pxResult', 'ok', j.message || '已保存');
                    toast('代理池配置已保存');
                    if (j.proxy_pool) applyProxyForm(j.proxy_pool);
                    if (j.runtime) renderProxyStatus(j.runtime);
                } else {
                    showStatus('pxResult', 'err', j.error || '保存失败');
                }
            } catch (e) {
                showStatus('pxResult', 'err', e.message || String(e));
            }
        }

        async function proxyAction(act) {
            const map = {
                start: '/api/proxy-pool/start',
                stop: '/api/proxy-pool/stop',
                refresh: '/api/proxy-pool/refresh',
                rotate: '/api/proxy-pool/rotate',
                test: '/api/proxy-pool/test',
            };
            const url = map[act];
            if (!url) return;
            showStatus('pxResult', 'info', act + ' 执行中…');
            try {
                // save config first so start uses latest form values
                if (act === 'start' || act === 'refresh' || act === 'test') {
                    await apiFetch('/api/proxy-pool/config', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(collectProxyBody()),
                    });
                }
                const j = await apiFetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: '{}' });
                if (j.ok) {
                    showStatus('pxResult', 'ok', j.message || (act + ' 成功') + (j.egress ? '<br>出口: ' + j.egress : '') + (j.rotated_to ? '<br>节点: ' + j.rotated_to : ''));
                    toast(j.message || 'OK');
                } else {
                    showStatus('pxResult', 'err', j.error || (act + ' 失败'));
                }
                renderProxyStatus(j);
            } catch (e) {
                showStatus('pxResult', 'err', e.message || String(e));
            }
        }

        // === 加载配置（仅 API Keys） ===
        async function loadConfig() {
            try {
                const r = await fetch('/api/config');
                cfg = await r.json();
                $id('apiKeys').value = cfg.api_keys || '';
                $id('passthroughToggle').checked = !!cfg.tools_passthrough;
                if (cfg.proxy_pool) applyProxyForm(cfg.proxy_pool);
                $id('adminPassword').value = cfg.admin_password || '';
                if (cfg.temp_mail) {
                    applyTempMailForm(cfg.temp_mail);
                    if (cfg.temp_mail.register_region) {
                        const sel = $id('reg-region');
                        if (sel) {
                            const v = cfg.temp_mail.register_region;
                            if ([...sel.options].some(o => o.value === v)) sel.value = v;
                        }

        function formatRegSuccess(j) {
            const uid = (j.saved && j.saved.user_id) || (j.tokens && j.tokens.user_id) || '';
            const ocrInfo = j.captcha_auto
                ? ('<br>OCR: <code>' + (j.captcha_ocr || '') + '</code> · 尝试 ' + ((j.captcha_attempts || []).length) + ' 次')
                : '';
            return '✅ 注册成功' + ocrInfo +
                '<br>邮箱: <code>' + (j.email || '') + '</code><br>密码: <code>' + (j.password || _regPassword) + '</code><br>userId: ' + uid +
                '<br>已保存账号并进入保活（passToken + 临时邮箱自动取码）';
        }

        function handleRegResponse(j) {
            if (j.need_captcha || (j.captcha_image && !j.logged_in && !j.registered)) {
                _regSessionId = j.session_id || _regSessionId;
                _regPassword = j.password || _regPassword;
                showRegCaptcha(j.captcha_image, j.email);
                const tries = (j.captcha_attempts || []).map(function (a) {
                    return (a.ocr || '?');
                }).join(', ');
                let msg = j.message || '请手动填写验证码';
                if (j.captcha_auto_failed && tries) {
                    msg += '<br>OCR 尝试: ' + tries;
                }
                if (j.ocr_available === false) {
                    msg += '<br>（未安装 ddddocr：pip install ddddocr）';
                }
                showStatus('regResult', j.captcha_auto_failed ? 'err' : 'info', msg);
                return;
            }
            if (j.ok && (j.logged_in || (j.saved && j.saved.ok))) {
                showStatus('regResult', 'ok', formatRegSuccess(j));
                toast('注册成功');
                _regSessionId = null;
                hideRegCaptcha();
                loadAccounts();
                return;
            }
            if (j.ok && j.registered && !j.logged_in) {
                showStatus('regResult', 'info',
                    '注册成功但自动登录未完成<br>邮箱: <code>' + j.email + '</code><br>密码: <code>' + j.password + '</code><br>' + (j.message || ''));
                return;
            }
            showStatus('regResult', 'err', j.error || j.message || '注册失败');
        }

        async function startBatchRegister() {
            if (_batchPolling && _batchJobId) {
                toast('已有任务进行中，可切换页面后回来查看进度', true);
                await resumeBatchJobIfAny();
                return;
            }
            _regSessionId = null;
            hideRegCaptcha();
            const p = collectRegRunParams();
            if (!p.auto_captcha) {
                toast('批量注册必须开启自动 OCR', true);
                return;
            }
            const target = isNaN(p.success_target) ? 1 : p.success_target;
            showStatus('regResult', 'info',
                '启动批量任务… 成功目标 ' + (target > 0 ? target : '不限') +
                ' / 最多尝试 ' + p.batch_count +
                ' / 并发 ' + p.concurrent +
                ' / 间隔 ' + p.concurrent_interval + 's');
            if ($id('regLogBox')) { $id('regLogBox').style.display = 'block'; $id('regLogBox').innerHTML = ''; }
            if ($id('regSlots')) { $id('regSlots').style.display = 'none'; $id('regSlots').innerHTML = ''; }
            $id('btn-reg-start').disabled = true;
            if ($id('btn-reg-batch')) $id('btn-reg-batch').disabled = true;
            try {
                const body = {
                    region: p.region,
                    batch_count: p.batch_count,
                    success_target: target,
                    concurrent: p.concurrent,
                    concurrent_interval: p.concurrent_interval,
                    captcha_retries: p.captcha_retries,
                    otp_timeout: p.otp_timeout,
                    auto_captcha: true,
                };
                if (p.domain) body.domain = p.domain;
                const j = await apiFetch('/api/account/auto-register-batch', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
                if (j.job_id || j.async || j.status === 'running') {
                    _batchJobId = j.job_id;
                    localStorage.setItem('mimo_batch_job_id', _batchJobId);
                    renderBatchProgress(j);
                    await startBatchPollLoop();
                } else if (j.results) {
                    renderBatchProgress(j);
                    if (j.success > 0) { toast('成功 ' + j.success + ' 个'); loadAccounts(); }
                } else {
                    showStatus('regResult', 'err', j.error || j.message || '批量失败');
                }
            } catch (e) {
                showStatus('regResult', 'err', e.message || String(e));
            } finally {
                if (!_batchPolling) {
                    $id('btn-reg-start').disabled = false;
                    if ($id('btn-reg-batch')) $id('btn-reg-batch').disabled = false;
                }
            }
        }

        // === Cookie 解析 ===
        function parseCookieStr() {
            const raw = $id('c-raw').value.trim();
            if (!raw) { toast('请粘贴 Cookie 字符串', true); return; }
            const parts = raw.split(';');
            const map = {};
            for (let p of parts) {
                p = p.trim();
                if (!p) continue;
                const eq = p.indexOf('=');
                if (eq === -1) continue;
                let key = p.substring(0, eq).trim();
                let val = p.substring(eq + 1).trim();
                // 去掉首尾引号
                if ((val.startsWith('"') && val.endsWith('"')) || (val.startsWith("'") && val.endsWith("'"))) {
                    val = val.slice(1, -1);
                }
                map[key] = val;
            }
            if (map.serviceToken) $id('c-st').value = map.serviceToken;
            if (map.userId) $id('c-uid').value = map.userId;
            if (map.xiaomichatbot_ph) $id('c-ph').value = map.xiaomichatbot_ph;
            const filled = [map.serviceToken, map.userId, map.xiaomichatbot_ph].filter(Boolean).length;
            if (filled >= 3) { toast('已填充 ' + filled + ' 个字段'); }
            else if (filled > 0) { toast('已填充 ' + filled + ' 个字段（缺少 ' + (3 - filled) + ' 个）', true); }
            else { toast('未识别到有效字段', true); }
        }

            const st = $id('c-st').value.trim();

            if (!st || !uid || !ph) { toast('请填写所有字段', true); return; }
            const btn = $id('btn-save-cookie');
            btn.disabled = true; btn.textContent = '验证中...';
            try {
                const r = await fetch('/api/account/import-cookie', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ serviceToken: st, userId: uid, xiaomichatbot_ph: ph })
                });
                const d = await r.json();
                if (d.ok) {
                    toast('已保存');
                    $id('c-st').value = ''; $id('c-uid').value = ''; $id('c-ph').value = '';
                    loadConfig();
                } else {
                    toast(d.error || '保存失败', true);
                }
            } catch (e) { toast('请求失败', true); }
            finally { btn.disabled = false; btn.textContent = '保存账号'; }
        }

        // === 邮箱+密码导入（mail code 需用户点击发送，不自动发/不自动重试） ===
        async function importEmail() {
            const btn = $id('btn-email-import');
            const email = ($id('e-email').value || '').trim();
            const password = $id('e-pass').value || '';
            const otp = ($id('e-otp').value || '').trim();
            const autoRenew = $id('e-autorenew').checked;
            if (!_emailSessionId && (!email || !password)) {
                toast('请填写所有字段', true);
                return;
            }
            if (_emailSessionId && !otp) {
                toast('请先发送并填写邮箱验证码', true);
                return;
            }
            btn.disabled = true;
            btn.textContent = '验证中...';
            try {
                const body = { email, password, auto_renew: autoRenew };
                if (_emailSessionId) {
                    body.session_id = _emailSessionId;
                    body.otp_code = otp;
                }
                const r = await fetch('/api/account/import-email', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body),
                });
                const d = await r.json();
                if (d.need_otp) {
                    _emailSessionId = d.session_id;
                    $id('e-otp-wrap').style.display = 'block';
                    $id('btn-email-import').style.display = 'none';
                    showStatus('emailResult', 'info', d.message || '需要邮箱验证：请点击「发送验证码」，不会自动发码');
                    toast(d.message || '需要邮箱验证码（请手动发送）');
                } else if (d.ok) {
                    _emailSessionId = null;
                    $id('e-otp-wrap').style.display = 'none';
                    $id('btn-email-import').style.display = 'block';
                    $id('e-otp').value = '';
                    showStatus('emailResult', 'success', '已导入 userId=' + d.user_id);
                    toast('账号已添加');
                    loadAccounts();
                    loadConfig();
                } else {
                    showStatus('emailResult', 'error', d.error || '导入失败');
                    toast(d.error || '导入失败', true);
                }
            } catch (e) {
                toast('请求失败', true);
            } finally {
                btn.disabled = false;
                btn.textContent = '导入账号';
            }
        }

        async function sendEmailOtp() {
            if (!_emailSessionId) {
                toast('请先点击导入账号，进入验证流程后再发送', true);
                return;
            }
            const btn = $id('btn-send-otp');
            btn.disabled = true;
            btn.textContent = '发送中...';
            try {
                const r = await fetch('/api/account/send-email-otp', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ session_id: _emailSessionId }),
                });
                const d = await r.json();
                if (d.ok) {
                    showStatus('emailResult', 'success', d.message || '验证码已发送');
                    toast(d.already_sent ? '本会话已发过码，不会自动重发' : '验证码已发送');
                } else {
                    showStatus('emailResult', 'error', d.error || '发送失败');
                    toast(d.error || '发送失败', true);
                }
            } catch (e) {
                toast('请求失败', true);
            } finally {
                btn.disabled = false;
                btn.textContent = '发送验证码';
            }
        }

        // === 账号管理（分页） ===
        function _acctTotalPages() {
            return Math.max(1, Math.ceil((_acctList.length || 0) / _acctPageSize));
        }

        function setAcctPageSize(size) {
            _acctPageSize = parseInt(size, 10) || 10;
            localStorage.setItem('mimo_acct_page_size', String(_acctPageSize));
            _acctPage = 1;
            renderAccountsPage();
        }

        function goAcctPage(page) {
            const total = _acctTotalPages();
            _acctPage = Math.min(total, Math.max(1, parseInt(page, 10) || 1));
            renderAccountsPage();
        }

        function renderAccountsPage() {
            const el = $id('accounts');
            const pager = $id('accountsPager');
            if (!_acctList.length) {
                el.innerHTML = '<div class="empty">暂无配置账号</div>';
                if (pager) pager.style.display = 'none';
                return;
            }
            const total = _acctList.length;
            const totalPages = _acctTotalPages();
            if (_acctPage > totalPages) _acctPage = totalPages;
            const start = (_acctPage - 1) * _acctPageSize;
            const end = Math.min(total, start + _acctPageSize);
            const slice = _acctList.slice(start, end);

            el.innerHTML = slice.map((a) => {
                const i = a._idx;
                return `
                    <div class="account">
                        <div class="info-line">
                            <span class="status-dot" style="background:${a.is_valid ? '#22c55e' : '#64748b'}"></span>
                            <b>#${i + 1}</b>
                            <b style="margin-left:8px">userId:</b> <code>${a.user_id}</code>
                            ${a.is_valid ? '<span style="color:#22c55e;margin-left:8px;font-size:12px">✅ 有效</span>' : '<span style="color:#94a3b8;margin-left:8px;font-size:12px">⚪ 未验证</span>'}
                            ${a.last_test ? '<span style="color:var(--text-muted);margin-left:4px;font-size:11px">· ' + a.last_test + '</span>' : ''}
                        </div>
                        ${a.email ? '<div class="info-line"><b>email:</b> <code>'+a.email+'</code>'+(a.auto_renew?' <span style="color:#38bdf8;font-size:11px">· 自动续期</span>':'')+(a.has_pass_token?' <span style="color:#a78bfa;font-size:11px">· passToken</span>':'')+(a.has_mail_jwt?' <span style="color:#34d399;font-size:11px" title="过期后可用临时邮箱自动取码重登">· temp-mail自动重登</span>':'')+(a.region?' <span style="color:var(--text-muted);font-size:11px">· '+a.region+'</span>':'')+'</div>' : ''}
                        <div class="info-line"><b>token:</b> <code>${a.token_masked}</code></div>
                        ${a.last_renew ? '<div class="info-line"><b>renew:</b> '+a.last_renew+(a.renew_error?' <span style="color:#f87171">'+a.renew_error+'</span>':'')+'</div>' : ''}
                        <div class="actions">
                            <button class="btn-outline" onclick="testAcct(${i})">测试</button>
                            <button class="btn-outline" onclick="renewAcct(${i})" style="border-color:#0ea5e9;color:#7dd3fc">续期</button>
                            <button class="btn-danger" onclick="delAcct(${i})">删除</button>
                        </div>
                    </div>`;
            }).join('');

            if (pager) {
                pager.style.display = 'flex';
                // page number buttons (window around current)
                let nums = '';
                const windowSize = 5;
                let from = Math.max(1, _acctPage - Math.floor(windowSize / 2));
                let to = Math.min(totalPages, from + windowSize - 1);
                from = Math.max(1, to - windowSize + 1);
                for (let p = from; p <= to; p++) {
                    nums += '<button type="button" class="page-btn' + (p === _acctPage ? ' active' : '') +
                        '" onclick="goAcctPage(' + p + ')">' + p + '</button>';
                }
                pager.innerHTML =
                    '<div>共 <b style="color:var(--text)">' + total + '</b> 个账号 · 第 ' +
                    _acctPage + '/' + totalPages + ' 页 · 显示 ' + (start + 1) + '-' + end + '</div>' +
                    '<div class="pager-btns">' +
                    '<span>每页</span>' +
                    '<select onchange="setAcctPageSize(this.value)">' +
                    [10, 20, 50, 100].map(function (n) {
                        return '<option value="' + n + '"' + (_acctPageSize === n ? ' selected' : '') + '>' + n + '</option>';
                    }).join('') +
                    '</select>' +
                    '<button type="button" class="page-btn" onclick="goAcctPage(1)" ' + (_acctPage <= 1 ? 'disabled' : '') + '>首页</button>' +
                    '<button type="button" class="page-btn" onclick="goAcctPage(' + (_acctPage - 1) + ')" ' + (_acctPage <= 1 ? 'disabled' : '') + '>上一页</button>' +
                    nums +
                    '<button type="button" class="page-btn" onclick="goAcctPage(' + (_acctPage + 1) + ')" ' + (_acctPage >= totalPages ? 'disabled' : '') + '>下一页</button>' +
                    '<button type="button" class="page-btn" onclick="goAcctPage(' + totalPages + ')" ' + (_acctPage >= totalPages ? 'disabled' : '') + '>末页</button>' +
                    '</div>';
            }
        }

        async function loadAccounts() {
            try {
                const r = await fetch('/api/accounts');
                const d = await r.json();
                if (!d.accounts || !d.accounts.length) {
                    _acctList = [];
                    renderAccountsPage();
                    return;
                }
                // 保留真实下标，供测试/续期/删除接口使用
                _acctList = d.accounts.map(function (a, i) {
                    a._idx = i;
                    return a;
                });
                if (_acctPage > _acctTotalPages()) _acctPage = _acctTotalPages();
                renderAccountsPage();
            } catch (e) {
                _acctList = [];
                $id('accounts').innerHTML = '<div class="empty">加载失败</div>';
                if ($id('accountsPager')) $id('accountsPager').style.display = 'none';
            }
        }

        async function renewAcct(i) {
            const btn = event.target;
            btn.disabled = true;
            btn.textContent = '续期中...';
            try {
                // 默认仅 passToken；失败时再询问是否用密码（可能要 mail code，且不自动发）
                let r = await fetch('/api/accounts/' + i + '/renew', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ allow_password: false }),
                });
                let d = await r.json();
                if (!d.ok && d.need_manual) {
                    if (confirm('passToken 续期失败。是否改用邮箱密码手动续期？\n（若需验证码：不会自动发送，需你点击发送后再填）')) {
                        r = await fetch('/api/accounts/' + i + '/renew', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ allow_password: true }),
                        });
                        d = await r.json();
                    }
                }
                if (d.need_otp && d.session_id) {
                    _emailSessionId = d.session_id;
                    switchTab('email');
                    $id('e-otp-wrap').style.display = 'block';
                    $id('btn-email-import').style.display = 'none';
                    showStatus('emailResult', 'info', d.message || '需要邮箱验证码：请点「发送验证码」后填写');
                    toast('需要邮箱验证码，请手动发送');
                } else {
                    toast(d.ok ? '续期成功: ' + (d.user_id || '') : ('续期失败: ' + (d.error || '')), !d.ok);
                }
                loadAccounts();
            } catch (e) { toast('请求失败', true); }
            btn.disabled = false;
            btn.textContent = '续期';
        }

        async function renewAll() {
            const btn = event.target;
            btn.disabled = true;
            btn.textContent = '续期中...';
            try {
                // 全部续期 = 自动策略：仅 passToken，不发 mail code
                const r = await fetch('/api/accounts/renew-all', { method: 'POST' });
                const d = await r.json();
                const results = d.results || [];
                const ok = results.filter(x => x.ok).length;
                const need = results.filter(x => x.need_manual || x.skipped).length;
                toast('续期完成: ' + ok + ' 成功（仅 passToken；需验证码的请手动处理）');
                loadAccounts();
            } catch (e) { toast('请求失败', true); }
            btn.disabled = false;
            btn.textContent = '全部续期';
        }

        async function testAcct(i) {
            const btn = event.target;
            btn.disabled = true;
            btn.textContent = '测试中...';
            try {
                const r = await fetch('/api/accounts/' + i + '/test', { method: 'POST' });
                const d = await r.json();
                toast(d.ok ? '✅ 有效: ' + (d.response || '').substring(0, 40) : '❌ ' + d.error, !d.ok);
                loadAccounts();
            } catch (e) { toast('测试失败', true); }
            btn.disabled = false;
            btn.textContent = '测试';
        }

        async function testAll() {
            const btn = event.target;
            btn.disabled = true;
            btn.textContent = '测试中...';
            try {
                const r = await fetch('/api/accounts');
                const d = await r.json();
                if (!d.accounts || !d.accounts.length) { toast('无账号可测试', true); btn.disabled = false; btn.textContent = '测试全部'; return; }
                let ok = 0;
                for (let i = 0; i < d.accounts.length; i++) {
                    btn.textContent = '测试中...(' + (i + 1) + '/' + d.accounts.length + ')';
                    try {
                        const r2 = await fetch('/api/accounts/' + i + '/test', { method: 'POST' });
                        const d2 = await r2.json();
                        if (d2.ok) ok++;
                    } catch (e) {}
                }
                toast(ok + '/' + d.accounts.length + ' 有效');
                loadAccounts();
            } catch (e) { toast('请求失败', true); }
            btn.disabled = false;
            btn.textContent = '测试全部';
        }

        async function cleanupSessions() {
            const btn = event.target;
            btn.disabled = true;
            btn.textContent = '清理中...';
            try {
                const r = await fetch('/api/cleanup', { method: 'POST' });
                const d = await r.json();
                toast(d.ok ? d.msg : '清理失败: ' + (d.msg || '未知'), !d.ok);
            } catch (e) { toast('清理失败: ' + e.message, true); }
            btn.disabled = false;
            btn.textContent = '清理过期会话';
        }

        async function delAcct(i) {
            if (!confirm('确定删除此账号？')) return;
            try {
                await fetch('/api/accounts/' + i, { method: 'DELETE' });
                toast('已删除');
                loadAccounts();
                loadConfig();
            } catch (e) { toast('删除失败', true); }
        }

        // === 用量统计 ===
        let usagePeriod = 'total';
        function fmt(n) { return n.toLocaleString(); }
        async function loadUsage() {
            try {
                const r = await fetch('/api/usage');
                const data = await r.json();
                const period = data[usagePeriod] || data.total || {};
                const models = period.models || {};
                const total = period.total || {};
                let entries = Object.entries(models).sort((a, b) => b[1].total_tokens - a[1].total_tokens);

                if (!entries.length && !total.requests) {
                    $id('usageContent').innerHTML = '<div class="usage-empty"><div class="icon">📊</div>暂无用量数据</div>';
                    return;
                }

                let html = '<div class="usage-scroll"><table class="usage-tbl"><thead><tr><th class="model-cell">'+'模型'+'</th><th>'+'请求'+'</th><th>'+'输入'+'</th><th>'+'输出'+'</th><th>'+'总计'+'</th></tr></thead><tbody>';
                for (const [model, m] of entries) {
                    html += `<tr>
                        <td class="model-cell">${model}</td>
                        <td>${fmt(m.requests)}</td>
                        <td>${fmt(m.prompt_tokens)}</td>
                        <td>${fmt(m.completion_tokens)}</td>
                        <td>${fmt(m.total_tokens)}</td>
                    </tr>`;
                }
                if (entries.length) {
                    html += `<tr class="total-row">
                        <td class="model-cell">${'📋 合计'}</td>
                        <td>${fmt(total.requests)}</td>
                        <td>${fmt(total.prompt_tokens)}</td>
                        <td>${fmt(total.completion_tokens)}</td>
                        <td>${fmt(total.total_tokens)}</td>
                    </tr>`;
                }
                html += '</tbody></table></div>';
                $id('usageContent').innerHTML = html;
            } catch (e) {
                $id('usageContent').innerHTML = '<div class="usage-empty">加载失败: ' + e.message + '</div>';
            }
        }
        function switchPeriod(p) {
            usagePeriod = p;
            document.querySelectorAll('#panel-usage .period-btn[data-p]').forEach(b => b.className = 'period-btn');
            document.querySelector('#panel-usage .period-btn[data-p="'+p+'"]').className = 'period-btn active';
            loadUsage();
        }
        async function clearUsage() {
            if (!confirm('确定清空全部用量数据？此操作不可撤销。')) return;
            try {
                const r = await fetch('/api/usage', { method: 'DELETE' });
                const d = await r.json();
                if (d.ok) { toast('已清空'); loadUsage(); }
                else toast('清空失败', true);
            } catch (e) { toast('清空失败: ' + e.message, true); }
        }

        // === 初始化 ===
        loadConfig();
        // 恢复未结束的批量注册进度（内存 job + localStorage job_id）
        setTimeout(function () { resumeBatchJobIfAny(); }, 300);
    </script>
</body>
</html>
