<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>MiMo2API 管理台</title>
  <style>
    :root { color-scheme: light; --ink:#17211b; --muted:#69736d; --line:#d8ddd9; --paper:#fff; --wash:#f3f5f3; --green:#16794b; --red:#b42318; --blue:#1769aa; --amber:#9a6700; }
    * { box-sizing:border-box; letter-spacing:0; } body { margin:0; background:var(--wash); color:var(--ink); font:14px/1.45 Inter,"Segoe UI",Arial,sans-serif; }
    header { min-height:58px; background:var(--paper); border-bottom:1px solid var(--line); display:flex; align-items:center; justify-content:space-between; gap:16px; padding:12px 28px; position:sticky; top:0; z-index:3; } h1 { font-size:18px; margin:0; } .runtime { color:var(--muted); font-size:12px; }
    nav { background:var(--paper); border-bottom:1px solid var(--line); padding:0 28px; display:flex; gap:22px; overflow:auto; } nav button { border:0; border-bottom:2px solid transparent; background:none; padding:13px 0 11px; color:var(--muted); cursor:pointer; white-space:nowrap; } nav button.active { color:var(--ink); border-color:var(--green); font-weight:600; }
    main { max-width:1180px; margin:0 auto; padding:24px 28px 48px; } .metrics { display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); border:1px solid var(--line); background:var(--paper); margin-bottom:22px; } .metric { padding:16px 18px; border-right:1px solid var(--line); } .metric:last-child{border:0}.metric b{display:block;font-size:22px}.metric span{color:var(--muted);font-size:12px}
    section { display:none; } section.active { display:block; } .bar { display:flex; align-items:center; justify-content:space-between; gap:12px; margin:0 0 12px; } h2 { font-size:16px; margin:0; } h3 { font-size:14px; margin:0 0 12px; }
    .panel { background:var(--paper); border:1px solid var(--line); padding:20px; } .panel + .panel { margin-top:14px; } .grid { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:15px 20px; } .grid.three { grid-template-columns:repeat(3,minmax(0,1fr)); } label { display:grid; gap:6px; color:var(--muted); font-size:12px; } input,select { width:100%; height:38px; border:1px solid #bfc8c1; background:#fff; padding:0 10px; color:var(--ink); font:inherit; } input:focus,select:focus { outline:2px solid #9fd3ba; border-color:var(--green); }
    .secret-field { display:flex; align-items:stretch; } .secret-field input { border-right:0; min-width:0; } .secret-toggle { width:40px; border:1px solid #bfc8c1; background:#fff; color:var(--muted); display:grid; place-items:center; cursor:pointer; flex:0 0 40px; } .secret-toggle:hover { color:var(--ink); background:#f8f9f8; } .secret-toggle svg { width:17px; height:17px; }
    button.action { border:1px solid #aab5ad; background:#fff; min-height:34px; padding:0 12px; cursor:pointer; color:var(--ink); font:inherit; } button.action:hover { background:#f8f9f8; } button.primary { background:var(--green); color:#fff; border-color:var(--green); } button.primary:hover { background:#10653d; } button.danger { color:var(--red); border-color:#efb3ad; } .actions { display:flex; gap:8px; flex-wrap:wrap; }
    table { width:100%; border-collapse:collapse; background:var(--paper); border:1px solid var(--line); } th,td { text-align:left; padding:11px 12px; border-bottom:1px solid var(--line); vertical-align:middle; } th { background:#f8f9f8; color:var(--muted); font-size:12px; font-weight:600; } td code { font-size:12px; color:var(--blue); } .ok { color:var(--green); }.bad{color:var(--red)}.warn{color:var(--amber)}.empty{padding:34px;text-align:center;color:var(--muted)}.table-wrap{overflow:auto}
    .split { display:grid; grid-template-columns:minmax(0,1.1fr) minmax(300px,.9fr); gap:14px; } .captcha-box { min-height:132px; border:1px dashed #aab5ad; background:#fbfcfb; display:grid; place-items:center; overflow:hidden; } .captcha-box img { display:block; max-width:100%; max-height:180px; object-fit:contain; } .caption { color:var(--muted); font-size:12px; margin:8px 0 0; } .status-line { color:var(--muted); min-height:20px; }
    .log { margin:0; min-height:190px; max-height:360px; overflow:auto; background:#111b14; color:#dbe7df; padding:12px; font:12px/1.55 ui-monospace,SFMono-Regular,Consolas,monospace; white-space:pre-wrap; } .log .error{color:#ffb4ab}.log .done{color:#90e0aa}.log .stage{color:#a6d4ff}.result-summary{color:var(--muted);font-size:12px;}
    #toast { position:fixed; right:22px; bottom:22px; max-width:420px; padding:11px 14px; background:#17211b; color:white; display:none; z-index:5; }
    @media(max-width:760px){header,nav{padding-left:16px;padding-right:16px}main{padding:18px 14px}.metrics{grid-template-columns:1fr 1fr}.metric:nth-child(2){border-right:0}.metric:nth-child(-n+2){border-bottom:1px solid var(--line)}.grid,.grid.three,.split{grid-template-columns:1fr}.table-wrap{overflow:auto}.bar{align-items:flex-start;flex-direction:column}.bar .actions{width:100%}}
  </style>
  <script src="/vendor/lucide/lucide.min.js"></script>
</head>
<body>
  <header><h1>MiMo2API</h1><span class="runtime">Node.js · SQLite · v3</span></header>
  <nav>
    <button class="active" data-tab="accounts">账号</button><button data-tab="register">注册</button><button data-tab="renewals">保活</button><button data-tab="mail">临时邮箱</button><button data-tab="proxy">代理</button><button data-tab="api">API</button>
  </nav>
  <main>
    <div class="metrics"><div class="metric"><b id="mAccounts">-</b><span>账号</span></div><div class="metric"><b id="mDue">-</b><span>待续期</span></div><div class="metric"><b id="mProxy">-</b><span>代理节点</span></div><div class="metric"><b id="mFailures">-</b><span>续期异常</span></div></div>

    <section id="accounts" class="active"><div class="bar"><h2>账号池</h2><button class="action" onclick="loadAll()">刷新</button></div><div class="table-wrap"><table><thead><tr><th>#</th><th>用户</th><th>邮箱</th><th>状态</th><th>最近续期</th><th>操作</th></tr></thead><tbody id="accountRows"></tbody></table></div></section>

    <section id="register"><div class="bar"><h2>注册机</h2><div class="actions"><button class="action" onclick="saveRegisterSettings()">保存注册设置</button><button class="action primary" onclick="startBatch()">启动批量注册</button><button class="action danger" id="stopBatch" onclick="stopBatch()" disabled>停止任务</button></div></div>
      <div class="panel grid three"><label>注册地区<select id="regRegion"><option value="RANDOM">随机地区</option><option value="US">美国</option><option value="SG">新加坡</option><option value="JP">日本</option><option value="HK">中国香港</option><option value="GB">英国</option></select></label><label>邮箱域名<input id="regDomain" placeholder="留空自动选择"></label><label>最大尝试<input id="regCount" type="number" min="1" max="200"></label><label>成功目标<input id="regTarget" type="number" min="0" max="200"></label><label>并发<input id="regConcurrent" type="number" min="1" max="3"></label><label>启动间隔（秒）<input id="regInterval" type="number" min="2" max="300"></label><label>图片验证码重试<input id="regCaptchaRetries" type="number" min="1" max="30"></label><label>本地 OCR 优先轮数<input id="regLocalCaptchaRetries" type="number" min="1" max="30"></label><label>邮箱等待秒数<input id="regOtpTimeout" type="number" min="30" max="600"></label><label>自动识别状态<input id="regCaptchaReady" readonly></label></div>
      <div class="panel split"><div><h3>单次注册与手动验证码</h3><div id="registerStatus" class="status-line">尚未创建注册会话</div><div class="captcha-box" id="captchaBox">创建会话后显示图片验证码</div><div class="grid" style="margin-top:14px"><label>图片验证码<input id="registerCaptcha" autocomplete="off"></label><label>会话 ID<input id="registerSession" readonly></label></div><div class="actions" style="margin-top:14px"><button class="action" onclick="startSingleRegister()">创建注册会话</button><button class="action" onclick="refreshCaptcha()">换一张</button><button class="action primary" onclick="submitCaptcha()">提交验证码</button></div></div><div><h3>批次任务</h3><div id="batchStatus" class="status-line">没有运行中的任务</div><div id="batchSummary" class="result-summary"></div><pre class="log" id="registerLog">等待任务启动</pre></div></div>
      <div class="panel"><h3>验证码视觉服务</h3><div class="grid"><label>启用<select id="captchaAiEnabled"><option value="false">否</option><option value="true">是</option></select></label><label>模型<input id="captchaAiModel" placeholder="支持图片的模型"></label><label style="grid-column:1/-1">API 地址<input id="captchaAiBase" placeholder="https://provider.example"></label><label style="grid-column:1/-1">API Key<div class="secret-field"><input id="captchaAiKey" type="password"><button class="secret-toggle" type="button" data-target="captchaAiKey" title="显示 API Key" aria-label="显示 API Key"><i data-lucide="eye"></i></button></div></label></div></div>
    </section>

    <section id="renewals"><div class="bar"><h2>保活队列</h2><button class="action primary" onclick="queueRenewals()">分散续期全部</button></div><div class="panel"><div class="grid"><label>运行状态<input id="rRunning" readonly></label><label>并发<input id="rConcurrency" readonly></label><label>下次任务<input id="rNext" readonly></label><label>队列<input id="rQueue" readonly></label></div></div></section>
    <section id="mail"><div class="bar"><h2>临时邮箱</h2><div class="actions"><button class="action" onclick="testMail()">测试</button><button class="action primary" onclick="saveMail()">保存</button></div></div><div class="panel grid"><label>API 地址<input id="mailBase"></label><label>管理口令<div class="secret-field"><input id="mailAdmin" type="password"><button class="secret-toggle" type="button" data-target="mailAdmin" title="显示管理口令" aria-label="显示管理口令"><i data-lucide="eye"></i></button></div></label><label>默认域名<input id="mailDomain"></label><label>站点口令<div class="secret-field"><input id="mailSite" type="password"><button class="secret-toggle" type="button" data-target="mailSite" title="显示站点口令" aria-label="显示站点口令"><i data-lucide="eye"></i></button></div></label></div></section>
    <section id="proxy"><div class="bar"><h2>代理池</h2><div class="actions"><button class="action" onclick="testProxy()">测活</button><button class="action primary" onclick="saveProxy()">保存</button></div></div><div class="panel grid"><label>启用<select id="proxyEnabled"><option value="true">是</option><option value="false">否</option></select></label><label>活动租约<input id="proxyLeases" readonly></label><label style="grid-column:1/-1">订阅地址<div class="secret-field"><input id="proxySub" type="password"><button class="secret-toggle" type="button" data-target="proxySub" title="显示订阅地址" aria-label="显示订阅地址"><i data-lucide="eye"></i></button></div></label></div></section>
    <section id="api"><div class="bar"><h2>访问配置</h2><button class="action primary" onclick="saveApi()">保存</button></div><div class="panel grid"><label>API Keys<div class="secret-field"><input id="apiKeys" type="password"><button class="secret-toggle" type="button" data-target="apiKeys" title="显示 API Keys" aria-label="显示 API Keys"><i data-lucide="eye"></i></button></div></label><label>管理密码<div class="secret-field"><input id="adminPassword" type="password"><button class="secret-toggle" type="button" data-target="adminPassword" title="显示管理密码" aria-label="显示管理密码"><i data-lucide="eye"></i></button></div></label></div></section>
  </main><div id="toast"></div>
  <script>
    let config={}, activeJobId='', registrationTimer=0;
    const $=id=>document.getElementById(id);
    const api=async(url,opt={})=>{const headers={...(opt.headers||{})};if(opt.body!==undefined&&!Object.keys(headers).some(k=>k.toLowerCase()==='content-type'))headers['Content-Type']='application/json';const r=await fetch(url,{...opt,headers});const j=await r.json().catch(()=>({}));if(!r.ok)throw new Error(j.error?.message||j.detail||j.message||r.statusText);return j};
    const toast=(m,bad=false)=>{const e=$('toast');e.textContent=m;e.style.background=bad?'#b42318':'#17211b';e.style.display='block';setTimeout(()=>e.style.display='none',3800)};const esc=v=>String(v??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));
    const refreshIcons=()=>window.lucide&&window.lucide.createIcons({attrs:{'stroke-width':1.8}});
    document.querySelectorAll('nav button').forEach(b=>b.onclick=()=>{document.querySelectorAll('nav button,section').forEach(e=>e.classList.remove('active'));b.classList.add('active');$(b.dataset.tab).classList.add('active')});
    document.addEventListener('click',e=>{const button=e.target.closest('.secret-toggle');if(!button)return;const input=$(button.dataset.target);const visible=input.type==='text';input.type=visible?'password':'text';button.title=visible?`显示${input.closest('label')?.childNodes[0]?.textContent?.trim()||'内容'}`:`隐藏${input.closest('label')?.childNodes[0]?.textContent?.trim()||'内容'}`;button.setAttribute('aria-label',button.title);button.innerHTML=`<i data-lucide="${visible?'eye':'eye-off'}"></i>`;refreshIcons()});
    async function loadAll(){try{config=await api('/api/config');const a=config.mimo_accounts||[];$('mAccounts').textContent=a.length;$('accountRows').innerHTML=a.length?a.map((x,i)=>`<tr><td>${i+1}</td><td><code>${esc(x.user_id||'-')}</code></td><td>${esc(x.email||'-')}</td><td class="${x.is_valid?'ok':'bad'}">${x.is_valid?'有效':'待验证'}</td><td>${esc(x.last_renew||'-')}</td><td><div class="actions"><button class="action" onclick="accountAction(${i},'test')">测试</button><button class="action" onclick="accountAction(${i},'renew')">续期</button><button class="action danger" onclick="accountAction(${i},'delete')">删除</button></div></td></tr>`).join(''):'<tr><td colspan="6" class="empty">暂无账号</td></tr>';applyForms();await loadRuntime();await loadRegistrationStatus()}catch(e){toast(e.message,true)}}
    function applyForms(){const m=config.temp_mail||{},p=config.proxy_pool||{},c=config.captcha_ai||{};$('mailBase').value=m.api_base||'';$('mailAdmin').value=m.admin_password||'';$('mailDomain').value=m.domain||'';$('mailSite').value=m.site_password||'';$('proxyEnabled').value=String(!!p.enabled);$('proxySub').value=p.sub_url||'';$('apiKeys').value=config.api_keys||'';$('adminPassword').value=config.admin_password||'';$('regRegion').value=m.register_region||'RANDOM';$('regDomain').value=m.domain||'';$('regCount').value=m.batch_count||5;$('regTarget').value=m.success_target||3;$('regConcurrent').value=m.concurrent||1;$('regInterval').value=m.concurrent_interval||3;$('regCaptchaRetries').value=m.captcha_retries||10;$('regLocalCaptchaRetries').value=m.local_captcha_retries||3;$('regOtpTimeout').value=m.otp_timeout||120;$('captchaAiEnabled').value=String(!!c.enabled);$('captchaAiBase').value=c.api_base||'';$('captchaAiKey').value=c.api_key||'';$('captchaAiModel').value=c.model||'';refreshIcons()}
    async function loadRuntime(){const r=await api('/api/accounts/renew-status'),p=await api('/api/proxy-pool/status');$('mDue').textContent=r.due;$('mFailures').textContent=r.failed;$('mProxy').textContent=p.node_count;$('proxyLeases').value=p.active_leases;$('rRunning').value=r.running?'运行中':'已停止';$('rConcurrency').value=r.concurrency;$('rNext').value=r.nextAt?new Date(r.nextAt).toLocaleString():'-';$('rQueue').value=`待处理 ${r.due} · 执行中 ${r.leased}`}
    async function accountAction(i,a){try{if(a==='delete'&&!confirm('确认删除该账号？'))return;const j=await api(`/api/accounts/${i}${a==='delete'?'':'/'+a}`,{method:a==='delete'?'DELETE':'POST'});toast(j.ok===false?j.error:'操作完成',j.ok===false);await loadAll()}catch(e){toast(e.message,true)}}
    async function queueRenewals(){try{const j=await api('/api/accounts/renew-all',{method:'POST'});toast(`已分散排队 ${j.queued} 个账号`);await loadRuntime()}catch(e){toast(e.message,true)}}
    async function saveMail(){try{await api('/api/temp-mail/config',{method:'POST',body:JSON.stringify({api_base:$('mailBase').value,admin_password:$('mailAdmin').value,domain:$('mailDomain').value,site_password:$('mailSite').value})});toast('已保存');await loadAll()}catch(e){toast(e.message,true)}}
    async function testMail(){try{const j=await api('/api/temp-mail/test',{method:'POST'});toast(j.test_address?`测试邮箱 ${j.test_address}`:'连接成功')}catch(e){toast(e.message,true)}}
    async function saveProxy(){try{await api('/api/proxy-pool/config',{method:'POST',body:JSON.stringify({enabled:$('proxyEnabled').value==='true',sub_url:$('proxySub').value})});toast('已保存');await loadRuntime()}catch(e){toast(e.message,true)}}
    async function testProxy(){try{const j=await api('/api/proxy-pool/test',{method:'POST',body:'{}'});toast(j.ok?'代理节点可用':'代理节点不可用',!j.ok);await loadRuntime()}catch(e){toast(e.message,true)}}
    async function saveApi(){try{await api('/api/config',{method:'POST',body:JSON.stringify({api_keys:$('apiKeys').value,admin_password:$('adminPassword').value})});toast('已保存，请使用新凭据重新登录')}catch(e){toast(e.message,true)}}
    const registerPayload=()=>({region:$('regRegion').value,domain:$('regDomain').value,batch_count:Number($('regCount').value),success_target:Number($('regTarget').value),concurrent:Number($('regConcurrent').value),concurrent_interval:Number($('regInterval').value),captcha_retries:Number($('regCaptchaRetries').value),local_captcha_retries:Number($('regLocalCaptchaRetries').value),otp_timeout:Number($('regOtpTimeout').value)});
    async function saveRegisterSettings(){try{const m={...(config.temp_mail||{}),register_region:$('regRegion').value,domain:$('regDomain').value,batch_count:Number($('regCount').value),success_target:Number($('regTarget').value),concurrent:Number($('regConcurrent').value),concurrent_interval:Number($('regInterval').value),captcha_retries:Number($('regCaptchaRetries').value),local_captcha_retries:Number($('regLocalCaptchaRetries').value),otp_timeout:Number($('regOtpTimeout').value)};const c={...(config.captcha_ai||{}),enabled:$('captchaAiEnabled').value==='true',api_base:$('captchaAiBase').value,api_key:$('captchaAiKey').value,model:$('captchaAiModel').value};await api('/api/config',{method:'POST',body:JSON.stringify({temp_mail:m,captcha_ai:c})});toast('注册设置已保存');await loadAll()}catch(e){toast(e.message,true)}}
    async function loadRegistrationStatus(){try{const s=await api('/api/registration/status');$('regCaptchaReady').value=s.captcha_ai_ready?'已配置':'未配置';if(!activeJobId){const running=(await api('/api/account/auto-register-batch')).jobs?.find(j=>['running','stopping'].includes(j.status));if(running){activeJobId=running.job_id;renderJob(running);scheduleJobPoll()}}}catch(e){$('regCaptchaReady').value='读取失败'}}
    async function startSingleRegister(){try{$('registerStatus').textContent='正在创建临时邮箱和验证码会话…';const j=await api('/api/account/auto-register',{method:'POST',body:JSON.stringify(registerPayload())});applySession(j);toast('注册会话已创建')}catch(e){$('registerStatus').textContent=e.message;toast(e.message,true)}}
    function applySession(j){$('registerSession').value=j.session_id||'';$('registerCaptcha').value='';$('registerStatus').textContent=j.message||'等待图片验证码';$('captchaBox').innerHTML=j.captcha_image?`<img src="${j.captcha_image}" alt="图片验证码">`:'没有可用验证码图片'}
    async function refreshCaptcha(){try{const id=$('registerSession').value;if(!id)throw new Error('请先创建注册会话');applySession(await api(`/api/account/auto-register/${id}/refresh-captcha`,{method:'POST'}));toast('验证码已刷新')}catch(e){toast(e.message,true)}}
    async function submitCaptcha(){try{const session_id=$('registerSession').value,captcha=$('registerCaptcha').value;if(!session_id||!captcha)throw new Error('请填写图片验证码');$('registerStatus').textContent='正在提交并等待邮箱验证码…';const j=await api('/api/account/auto-register/captcha',{method:'POST',body:JSON.stringify({...registerPayload(),session_id,captcha})});if(j.need_captcha){applySession(j);toast(j.error||'验证码不正确，请重试',true)}else{$('registerStatus').textContent=j.saved?`账号已写入账号池${j.user_id?` · ${j.user_id}`:''}`:j.message||'注册已完成';$('captchaBox').textContent='注册流程已完成';toast($('registerStatus').textContent);await loadAll()}}catch(e){$('registerStatus').textContent=e.message;toast(e.message,true)}}
    async function startBatch(){try{await saveRegisterSettings();const j=await api('/api/account/auto-register-batch',{method:'POST',body:JSON.stringify(registerPayload())});activeJobId=j.job_id;renderJob(j);scheduleJobPoll();toast('批量注册已启动')}catch(e){toast(e.message,true)}}
    async function pollJob(){if(!activeJobId)return;try{const j=await api(`/api/account/auto-register-batch/${activeJobId}`);renderJob(j);if(['running','stopping'].includes(j.status))scheduleJobPoll();else{activeJobId='';$('stopBatch').disabled=true;await loadAll()}}catch(e){toast(e.message,true);activeJobId=''}}
    function scheduleJobPoll(){clearTimeout(registrationTimer);registrationTimer=setTimeout(pollJob,3500)}
    function renderJob(j){$('batchStatus').textContent=j.message||j.status;$('batchSummary').textContent=`状态 ${j.status} · 成功 ${j.success} · 失败 ${j.failed} · 已尝试 ${(j.results||[]).length}/${j.requested}`;$('stopBatch').disabled=j.status!=='running';$('registerLog').innerHTML=(j.logs||[]).map(x=>{const t=new Date(x.at).toLocaleTimeString();const cls=x.stage==='error'?'error':x.stage==='done'?'done':'stage';return `<span class="${cls}">[${esc(t)}] #${esc(x.attempt||'-')} ${esc(x.stage)}</span> ${x.email?esc(x.email)+' ':''}${esc(x.message)}`}).join('\n')||'等待日志';$('registerLog').scrollTop=$('registerLog').scrollHeight}
    async function stopBatch(){try{if(!activeJobId)return;clearTimeout(registrationTimer);$('stopBatch').disabled=true;const j=await api(`/api/account/auto-register-batch/${activeJobId}/stop`,{method:'POST',body:'{}'});renderJob(j);scheduleJobPoll();toast('正在停止任务')}catch(e){$('stopBatch').disabled=false;toast(e.message,true)}}
    refreshIcons();loadAll();setInterval(loadRuntime,15000);
  </script>
</body>
</html>
