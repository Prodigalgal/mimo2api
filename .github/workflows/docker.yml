name: Build and publish MiMo2API

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: mimo2api-container-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: speedproxy/mimo2api
  IMAGE_TAG: sha-${{ github.sha }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate image metadata
        id: metadata
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=long
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and publish multi-architecture image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true

  update-gitops:
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-24.04
    concurrency:
      group: mimo2api-gitops-production
      cancel-in-progress: false
    steps:
      - name: Checkout GitOps source of truth
        uses: actions/checkout@v4
        with:
          repository: Prodigalgal/ircs-prod-config
          ref: main
          ssh-key: ${{ secrets.MIMO2API_GITOPS_DEPLOY_KEY }}
          persist-credentials: false
          fetch-depth: 0
          path: gitops

      - uses: imranismail/setup-kustomize@v2

      - name: Refresh GitOps checkout
        working-directory: gitops
        run: |
          git fetch origin main
          git checkout main
          git pull --ff-only origin main

      - name: Update immutable image pin
        run: |
          cd gitops/mimo2api/oracle
          kustomize edit set image \
            ghcr.io/example/mimo2api=${IMAGE_NAME}:${IMAGE_TAG}
          kustomize build . >/tmp/mimo2api-rendered.yaml

      - name: Commit GitOps revision
        working-directory: gitops
        run: |
          if git diff --quiet -- mimo2api/oracle/kustomization.yaml; then
            echo "GitOps image is already current"
            exit 0
          fi
          git config user.name "mimo2api-ci"
          git config user.email "mimo2api-ci@users.noreply.github.com"
          git add mimo2api/oracle/kustomization.yaml
          git commit -m "deploy(mimo2api): ${IMAGE_TAG}"
          git fetch origin main
          git rebase origin/main
          git push origin HEAD:main
